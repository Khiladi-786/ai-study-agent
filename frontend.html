<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<title>AI Study Agent</title>

<style>
body{
font-family:Arial;
background:#0b1320;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
color:white;
}

#chat{
width:600px;
background:#1c2a3d;
border-radius:12px;
padding:20px;
}

#messages{
height:350px;
overflow-y:auto;
margin-bottom:20px;
}

.user{
background:#2d6cdf;
padding:10px;
border-radius:10px;
margin:8px 0;
text-align:right;
}

.ai{
background:#3b4b61;
padding:10px;
border-radius:10px;
margin:8px 0;
}

input{
width:80%;
padding:12px;
border-radius:6px;
border:none;
}

button{
padding:12px;
background:#27ae60;
color:white;
border:none;
border-radius:6px;
cursor:pointer;
}
</style>
</head>

<body>

<div id="chat">

<h2>AI Study Agent</h2>

<div id="messages"></div>

<input id="question" placeholder="Ask something about AI / ML..." />
<button onclick="ask()">Send</button>

</div>

<script>

async function ask(){

let q=document.getElementById("question").value
let messages=document.getElementById("messages")

messages.innerHTML+=`<div class="user">${q}</div>`

try{

let res = await fetch("https://ai-study-agent-28fe.onrender.com/ask",{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({question:q})
})

let data = await res.json()

messages.innerHTML+=`<div class="ai">${data.answer || data.error}</div>`

}catch(err){

messages.innerHTML+=`<div class="ai">Server not reachable</div>`

}

}

</script>

</body>
</html>
